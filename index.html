<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>HDTV GOLD LIVE</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold-main: #FFD700; --bg-dark: #08080a; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; user-select: none; }
        
        html, body {
            background: #000; color: #fff; font-family: 'Montserrat', sans-serif;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden;
        }

        .hide { display: none !important; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: #000; }

        /* Foco Amarelo */
        .focused { 
            border: 2px solid #fff !important; background: #FFD700 !important; color: #000 !important; 
            z-index: 50; transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .focused * { color: #000 !important; }

        /* Login */
        .login-box { width: 400px; padding: 30px; background: #101010; border: 2px solid #FFD700; border-radius: 10px; text-align: center; }
        .inp { width: 100%; padding: 12px; margin: 10px 0; background: #202020; border: 1px solid #333; color: #fff; text-align: center; font-weight: bold; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; margin-top: 15px; background: var(--gold-main); color: #000; border: none; font-weight: 900; border-radius: 5px; }

        /* Layout Principal */
        #content-layer { display: flex; width: 100%; height: 100%; }
        .col-cat { width: 28%; background: #08080a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .col-list { width: 32%; background: #101014; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .col-play { flex: 1; display: flex; flex-direction: column; background: #000; padding: 0; }

        /* Itens */
        .cat-item, .item { padding: 12px 10px; margin: 4px; font-weight: 700; color: #777; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 2.2vh; }
        .cat-item.active { color: #fff; background: #222; border-left: 4px solid var(--gold-main); }
        .item { border-bottom: 1px solid #1a1a1a; }
        .item.playing { color: var(--gold-main); background: #151515; }

        /* Player e Info */
        .vid-box { width: 100%; height: 50vh; background: #000; position: relative; border-bottom: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        #vid-box.fs { position: fixed; top: 0; left: 0; width: 100% !important; height: 100% !important; z-index: 9999; border: none; }

        .meta-container { padding: 2vh; flex: 1; display: flex; flex-direction: column; }
        .meta-title { font-size: 3vh; font-weight: 900; color: #FFD700; margin-bottom: 2vh; border-bottom: 1px solid #222; padding-bottom: 1vh; }
        
        /* NOVA ÁREA DE INFO DA CONTA */
        .account-info { 
            background: #0a0a0a; border: 1px solid #222; border-radius: 1vh; padding: 1.5vh; 
            margin-bottom: auto; /* Empurra as teclas para baixo */
        }
        .info-row { display: flex; justify-content: space-between; font-size: 1.8vh; margin-bottom: 0.8vh; color: #999; }
        .info-val { color: #fff; font-weight: bold; }
        .total-badge { margin-top: 1vh; padding-top: 1vh; border-top: 1px solid #222; color: var(--gold-main); font-weight: 900; text-align: center; font-size: 2vh; }

        .keys { display: flex; gap: 15px; margin-top: 20px; font-size: 1.5vh; color: #666; justify-content: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        #loader { background: #000; z-index: 20000; flex-direction: column; color: var(--gold-main); font-weight: 900; font-size: 4vh; }
        .scroll-y { overflow-y: auto; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body onload="App.init()">

    <div id="loader" class="hide flex-center">
        <i class="fas fa-circle-notch fa-spin" style="margin-bottom:20px; font-size: 6vh;"></i>
        <div id="load-txt">CARREGANDO...</div>
    </div>

    <div id="login-layer" class="layer flex-center hide">
        <div class="login-box">
            <div style="font-size: 4vh; font-weight: 900; color:#fff; margin-bottom: 20px;">HDTV <span style="color:#FFD700">LOGIN</span></div>
            <input type="text" id="i0" class="inp focusable" placeholder="URL DNS">
            <input type="text" id="i1" class="inp focusable" placeholder="USUÁRIO">
            <input type="password" id="i2" class="inp focusable" placeholder="SENHA">
            <button id="i3" class="btn focusable" onclick="App.login(false)">ENTRAR AGORA</button>
            <div id="msg-login" style="color:#FFD700; margin-top:10px; font-size: 14px;"></div>
        </div>
    </div>

    <div id="content-layer" class="layer hide">
        <div class="col-cat scroll-y">
            <div style="padding:15px; text-align:center; font-weight:900; color:#FFD700; border-bottom:1px solid #222; font-size: 2.5vh;">CATEGORIAS</div>
            <div id="cat-list"></div>
        </div>
        
        <div class="col-list scroll-y">
            <div style="padding:10px;"><input id="search" class="inp focusable" placeholder="BUSCAR..." style="font-size: 2vh; padding: 1vh;"></div>
            <div id="item-list"></div>
        </div>
        
        <div class="col-play">
            <div id="vid-box" class="vid-box focusable" onclick="App.toggleFull()">
                <video id="player" playsinline webkit-playsinline></video>
            </div>
            
            <div class="meta-container">
                <div id="meta-title" class="meta-title">SELECIONE UM CANAL</div>
                
                <div class="account-info">
                    <div class="info-row"><span>USUÁRIO:</span> <span id="inf-user" class="info-val">...</span></div>
                    <div class="info-row"><span>VENCIMENTO:</span> <span id="inf-exp" class="info-val" style="color:#FFD700">...</span></div>
                    <div class="info-row"><span>TELAS:</span> <span id="inf-conn" class="info-val">...</span></div>
                    <div class="total-badge">TOTAL DE CANAIS: <span id="inf-total" style="color:#fff">0</span></div>
                </div>

                <div class="keys">
                    <div><span class="dot" style="background:#FF0000"></span>FULLSCREEN</div>
                    <div><span class="dot" style="background:#00C851"></span>RECARREGAR</div>
                    <div><span class="dot" style="background:#ffbb33"></span>BUSCA</div>
                    <div><span class="dot" style="background:#33b5e5"></span>SAIR</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var Player = {
            v: null, url: null, timer: null,
            init: function() { 
                this.v = document.getElementById('player');
                this.v.onerror = function() { Player.retry(); }; 
                this.v.controls = false;
            },
            play: function(url) {
                if(this.url === url && !this.v.paused) return;
                this.stop(); this.url = url; 
                this.v.src = url; 
                var p = this.v.play();
                if(p && typeof p.catch === 'function') { p.catch(function(e){}); }
                this.monitor();
            },
            stop: function() {
                if(this.timer) clearInterval(this.timer);
                if(this.v) { this.v.pause(); this.v.removeAttribute('src'); this.v.load(); }
            },
            monitor: function() {
                var lastTime = 0; var stall = 0;
                this.timer = setInterval(function(){
                    if(!Player.v || Player.v.paused) return;
                    if(Math.abs(Player.v.currentTime - lastTime) < 0.1) {
                        stall++; if(stall > 10) { stall=0; Player.retry(); }
                    } else { stall=0; lastTime = Player.v.currentTime; }
                }, 1000);
            },
            retry: function() {
                setTimeout(function(){ if(Player.url) { Player.v.src = Player.url; Player.v.play(); } }, 2000);
            }
        };

        var App = {
            scr: 0, zone: 0, idx: 0, creds: {}, fullData: [], catData: [], catIdx: 0, userInfo: null,
            
            init: function() {
                Player.init();
                if(localStorage.getItem('h_url')) {
                    document.getElementById('i0').value = localStorage.getItem('h_url');
                    document.getElementById('i1').value = localStorage.getItem('h_usr');
                    document.getElementById('i2').value = localStorage.getItem('h_pwd');
                    this.login(true);
                } else { this.setScr(0); }
            },

            req: function(u, cb) {
                var x = new XMLHttpRequest(); x.timeout = 15000;
                x.open('GET', u, true);
                x.onload = function() { if(x.status===200) { try{cb(JSON.parse(x.responseText));}catch(e){cb(null);} } else cb(null); };
                x.onerror = function() { cb(null); }; x.send();
            },

            login: function(auto) {
                var h = document.getElementById('i0').value.trim(); if(!h.startsWith('http')) h = 'http://'+h;
                var u = document.getElementById('i1').value.trim(); var p = document.getElementById('i2').value.trim();
                if(!auto) document.getElementById('loader').classList.remove('hide');

                this.req(h+"/player_api.php?username="+u+"&password="+p, function(d){
                    if(d && d.user_info && d.user_info.auth==1) {
                        App.creds = { h:h, u:u, p:p }; App.userInfo = d.user_info;
                        localStorage.setItem('h_url', h); localStorage.setItem('h_usr', u); localStorage.setItem('h_pwd', p);
                        // DIRETO PARA A TV AO VIVO
                        App.openLive();
                    } else {
                        document.getElementById('loader').classList.add('hide');
                        if(!auto) document.getElementById('msg-login').innerText = "DADOS INVÁLIDOS";
                        else App.setScr(0);
                    }
                });
            },

            setScr: function(n) {
                document.querySelectorAll('.layer').forEach(function(l){l.classList.add('hide')});
                if(n===0) document.getElementById('login-layer').classList.remove('hide');
                if(n===1) document.getElementById('content-layer').classList.remove('hide');
                this.scr = n; this.zone = 0; this.idx = 0; this.updateFocus();
            },

            openLive: function() {
                // Carrega Info da Conta
                if(this.userInfo) {
                    var exp = this.userInfo.exp_date ? new Date(this.userInfo.exp_date*1000).toLocaleDateString('pt-BR') : 'Indefinido';
                    var conn = (this.userInfo.active_cons || 0) + "/" + (this.userInfo.max_connections || 1);
                    document.getElementById('inf-user').innerText = this.userInfo.username;
                    document.getElementById('inf-exp').innerText = exp;
                    document.getElementById('inf-conn').innerText = conn;
                }

                // Carrega Categorias
                this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_live_categories", function(cats){
                    if(cats) {
                        App.catData = cats;
                        var h = '';
                        // Renderiza Categorias
                        cats.forEach(function(cat, i){
                            // Filtro básico de XXX
                            if(cat.category_name.toLowerCase().match(/xxx|adult|porn/)) return;
                            h += '<div id="c'+i+'" class="cat-item" onclick="App.clickCat('+i+')">'+cat.category_name+'</div>';
                        });
                        document.getElementById('cat-list').innerHTML = h;
                        
                        // Busca Canais em background
                        App.req(App.creds.h+"/player_api.php?username="+App.creds.u+"&password="+App.creds.p+"&action=get_live_streams", function(strms){
                            document.getElementById('loader').classList.add('hide');
                            App.setScr(1);
                            if(strms) { 
                                App.fullData = strms;
                                document.getElementById('inf-total').innerText = strms.length;
                                // NÃO CARREGA LISTA AINDA - ESPERA CLIQUE
                                document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center; color:#555;">SELECIONE UMA CATEGORIA</div>';
                            }
                        });
                    }
                });
            },

            clickCat: function(i) {
                this.catIdx = i;
                document.querySelectorAll('.cat-item').forEach(function(el){el.classList.remove('active')});
                document.getElementById('c'+i).classList.add('active');
                
                var cid = this.catData[i].category_id;
                var list = this.fullData.filter(function(x){ return x.category_id == cid; });
                
                var h = '';
                if(list.length === 0) h = '<div style="padding:20px; text-align:center; color:#555;">VAZIO</div>';
                else {
                    var max = list.length > 500 ? 500 : list.length;
                    for(var k=0; k<max; k++) {
                        h += '<div id="r'+k+'" class="item" onclick="App.playStream('+k+', \''+list[k].stream_id+'\', \''+list[k].name+'\')">'+list[k].name+'</div>';
                    }
                }
                document.getElementById('item-list').innerHTML = h;
                
                // Muda foco para a lista de canais
                this.zone = 1; this.idx = 0; this.updateFocus();
            },

            playStream: function(idx, id, name) {
                document.querySelectorAll('.item').forEach(function(el){el.classList.remove('playing')});
                var r = document.getElementById('r'+idx); if(r) r.classList.add('playing');
                
                document.getElementById('meta-title').innerText = name;
                var url = this.creds.h+"/live/"+this.creds.u+"/"+this.creds.p+"/"+id+".ts";
                Player.play(url);
                this.zone=1; this.updateFocus();
            },

            toggleFull: function() {
                var v = document.getElementById('vid-box');
                if(v.classList.contains('fs')) {
                    v.classList.remove('fs');
                    if(document.exitFullscreen) document.exitFullscreen();
                } else {
                    v.classList.add('fs');
                    if(v.requestFullscreen) v.requestFullscreen();
                }
            },

            logout: function() { localStorage.clear(); location.reload(); },

            move: function(d) {
                if(this.scr===0) { if(d===1 && this.idx<3) this.idx++; if(d===0 && this.idx>0) this.idx--; }
                if(this.scr===1) {
                    // Sair do Fullscreen se tiver
                    if(document.getElementById('vid-box').classList.contains('fs')) return;

                    if(this.zone===0) { // Categorias
                        if(d===1) this.idx++; if(d===0 && this.idx>0) this.idx--;
                        if(d===3) { if(document.getElementById('item-list').children.length > 1) { this.zone=1; this.idx=0; } }
                        // Scroll
                        var el = document.getElementById('c'+this.idx);
                        if(el) el.parentElement.scrollTop = el.offsetTop - el.parentElement.offsetHeight/2;
                    }
                    else if(this.zone===1) { // Canais
                        if(d===1) this.idx++;
                        if(d===0) { if(this.idx>0) this.idx--; else document.getElementById('search').focus(); }
                        if(d===2) { this.zone=0; this.idx=this.catIdx; }
                        if(d===3) { this.zone=3; }
                        // Scroll
                        var el = document.getElementById('r'+this.idx);
                        if(el) el.parentElement.scrollTop = el.offsetTop - el.parentElement.offsetHeight/2;
                    }
                }
                this.updateFocus();
            },

            enter: function() {
                if(this.scr===0) { if(this.idx===3) this.login(); }
                if(this.scr===1) {
                    if(this.zone===0) this.clickCat(this.idx);
                    else if(this.zone===1) {
                        if(document.activeElement.id === 'search') { /* Busca */ } 
                        else { 
                            var el = document.getElementById('r'+this.idx);
                            if(el) el.click();
                        }
                    }
                    else if(this.zone===3) this.toggleFull();
                }
            },

            updateFocus: function() {
                document.querySelectorAll('.focused').forEach(function(e){e.classList.remove('focused')});
                var el;
                if(this.scr===0) el = document.getElementById('i'+this.idx);
                if(this.scr===1) {
                    if(this.zone===0) el = document.getElementById('c'+this.idx);
                    if(this.zone===1) {
                        if(document.activeElement.id === 'search') el = document.getElementById('search');
                        else el = document.getElementById('r'+this.idx);
                    }
                    if(this.zone===3) el = document.getElementById('vid-box');
                }
                if(el) { el.classList.add('focused'); if(el.tagName!=='INPUT') el.focus(); }
            }
        };

        document.addEventListener('keydown', function(e) {
            var k = e.keyCode;
            if(document.activeElement.tagName==='INPUT' && k!==13 && k!==40) return;
            if(k===37) App.move(2); if(k===38) App.move(0); if(k===39) App.move(3); if(k===40) App.move(1);
            if(k===13) App.enter();
            if(k===8||k===27||k===461||k===10009) { 
                if(document.getElementById('vid-box').classList.contains('fs')) App.toggleFull();
                else if(App.zone===1) { App.zone=0; App.idx=App.catIdx; App.updateFocus(); }
            }
            if(k===403||k===82) App.toggleFull(); // Red
            if(k===404||k===71) location.reload(); // Green (Refresh)
            if(k===405||k===89) document.getElementById('search').focus(); // Yellow
            if(k===406||k===66) App.logout(); // Blue (Sair)
        });
    </script>
</body>
</html>
